name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Security: secret scan
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run secret scan
        run: |
          cd gateway
          npx ts-node --esm scripts/secret-scan.ts

  # ─────────────────────────────────────────────────────────────────────────
  # Python: lint + unit tests + bridge hardening + smoke
  # ─────────────────────────────────────────────────────────────────────────
  python:
    name: Python (bridge + pipeline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bridge/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-asyncio aiohttp structlog

      - name: Unit tests
        env:
          AI_STACK_BRIDGE_SECRET: ci-secret-${{ github.run_id }}
          APP_ENV: development
        run: |
          python -m pytest -q -m "not integration"

      - name: Smoke test (bridge end-to-end)
        env:
          APP_ENV: development
        run: |
          cd ..
          bash scripts/smoke.sh

  # ─────────────────────────────────────────────────────────────────────────
  # TypeScript: typecheck + targeted vitest subset
  # ─────────────────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript (gateway)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (gateway subset)
        run: npx vitest run --reporter=basic --no-coverage src/gateway/ src/middleware/
        env:
          CI: "1"

  # ─────────────────────────────────────────────────────────────────────────
  # Docker: build images to verify Dockerfiles are valid
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          tags: alloy-gateway:ci
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

      - name: Build optimization-bridge image
        uses: docker/build-push-action@v5
        with:
          context: ./bridge
          target: runtime
          push: false
          tags: alloy-bridge:ci
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,scope=bridge,mode=max

      - name: Smoke compose up / down
        env:
          GATEWAY_AUTH_TOKEN: ci-gateway-token
          BRIDGE_SECRET: ci-bridge-secret
          APP_ENV: development
        run: |
          docker compose -f docker-compose.unified.yml up -d gateway optimization-bridge
          # Wait for gateway & bridge healthy (max 90s)
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' alloy-gateway 2>/dev/null | grep -q healthy \
               && docker inspect --format='{{.State.Health.Status}}' alloy-bridge 2>/dev/null | grep -q healthy; then
              echo "stack healthy"
              break
            fi
            sleep 3
          done
          docker ps
          docker compose -f docker-compose.unified.yml logs --tail 50
          docker compose -f docker-compose.unified.yml down -v

  # ─────────────────────────────────────────────────────────────────────────
  # Terraform: fmt + validate (IaC sanity)
  # ─────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive
      - name: init (no backend)
        working-directory: terraform
        run: terraform init -backend=false
      - name: validate
        working-directory: terraform
        run: terraform validate
