# Alloy AI Platform — Unified Docker Compose
#
# Services:
#   gateway              — TypeScript Fastify Gateway (port 3000)
#   optimization-bridge  — Python HTTP Bridge for optimization (port 9100)
#   ollama               — Local LLM server (port 11434)
#   caveman-service      — Prose compression API (port 5000)
#
# Quick start:
#   docker compose -f infra/docker/docker-compose.unified.yml up --build -d
#
# Dev mode (gateway + bridge only):
#   docker compose -f infra/docker/docker-compose.unified.yml up gateway optimization-bridge
#
# Full stack with Ollama:
#   docker compose -f infra/docker/docker-compose.unified.yml --profile full up --build -d

version: "3.9"

networks:
  alloy-net:
    driver: bridge

volumes:
  ollama-data:
  alloy-stack-data:
  chromadb-data:
  gateway-data:

services:

  # ── Gateway (TypeScript) ──────────────────────────────────────────────────
  gateway:
    build:
      context: ../../core/gateway
      dockerfile: Dockerfile
    container_name: alloy-gateway
    restart: unless-stopped
    networks:
      - alloy-net
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      optimization-bridge:
        condition: service_healthy
    volumes:
      - gateway-data:/data
    environment:
      NODE_ENV: production
      APP_ENV: "${APP_ENV:-production}"
      ALLOY_GATEWAY_PORT: "3000"
      ALLOY_GATEWAY_HOST: "0.0.0.0"
      ALLOY_GATEWAY_TOKEN: "${GATEWAY_AUTH_TOKEN:?Set GATEWAY_AUTH_TOKEN}"
      ALLOY_BRIDGE_HOST: "optimization-bridge"
      ALLOY_BRIDGE_PORT: "9100"
      ALLOY_BRIDGE_SECRET: "${BRIDGE_SECRET:?Set BRIDGE_SECRET}"

      # Provider: Google Antigravity
      GOOGLE_OAUTH_ENABLED: "${GOOGLE_OAUTH_ENABLED:-true}"

      # Provider: Claude Code
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
      CLAUDE_AUTH_ENABLED: "${CLAUDE_AUTH_ENABLED:-true}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Optimization Bridge (Python) ──────────────────────────────────────────
  optimization-bridge:
    build:
      context: ../../core/bridge
      dockerfile: Dockerfile
    container_name: alloy-optimization
    restart: unless-stopped
    networks:
      - alloy-net
    ports:
      - "${BRIDGE_PORT:-9100}:9100"
    volumes:
      - alloy-stack-data:/data
      - chromadb-data:/data/chromadb
    environment:
      APP_ENV: "${APP_ENV:-production}"
      ALLOY_DATA_DIR: "/data"
      ALLOY_OLLAMA_URL: "http://ollama:11434"
      ALLOY_OPENROUTER_API_KEY: "${ALLOY_OPENROUTER_API_KEY:-}"
      ALLOY_BRIDGE_SECRET: "${BRIDGE_SECRET:?Set BRIDGE_SECRET}"
      BRIDGE_CORS_ORIGIN: "${BRIDGE_CORS_ORIGIN:-https://alloy.example.com}"
      PYTHONPATH: "/app"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    # Override default CMD to run bridge instead of MCP server
    command: ["python", "bridge.py", "--port", "9100", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9100/ready"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

