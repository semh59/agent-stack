# AI Stack MCP — Single-stack Docker Compose
#
# Services:
#   ollama           — local LLM server (qwen2.5-7b + mistral-7b + nomic-embed)
#   caveman-service  — Flask prose compression API (port 5000)
#   ai-stack-mcp     — MCP server + test runner (no exposed port; stdio for Claude Code)
#
# Quick start:
#   docker compose up --build -d
#
# Run tests inside the stack:
#   docker compose run --rm ai-stack-mcp pytest tests/ -v
#
# Integration tests (requires Ollama):
#   docker compose run --rm ai-stack-mcp pytest tests/ -v -m integration
#
# Stream logs:
#   docker compose logs -f

version: "3.9"

# ---------------------------------------------------------------------------
# Shared network
# ---------------------------------------------------------------------------

networks:
  ai-stack-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------

volumes:
  ollama-data:       # Ollama model weights — persisted across restarts
  ai-stack-data:     # ai-stack-mcp runtime data (cache.db, mab_state.db, costs.db)
  chromadb-data:     # ChromaDB semantic cache
  lancedb-data:      # LanceDB RAG index

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # Ollama — local LLM server
  # Pulls models on first start (nomic-embed-text, qwen2.5, mistral).
  # GPU support: uncomment the deploy section below if NVIDIA GPU is available.
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ai-stack-ollama
    restart: unless-stopped
    networks:
      - ai-stack-net
    ports:
      - "11434:11434"          # expose for local dev / Claude Code access
    volumes:
      - ollama-data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      SKIP_MODEL_PULL: "${SKIP_MODEL_PULL:-0}"  # set to 1 in CI to skip pulls
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 120s     # model pulls can take a while
      retries: 5
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # --------------------------------------------------------------------------
  # Caveman Service — Flask HTTP API for prose compression
  # Uses CavemanCompressor (Ollama) with pure-Python fallback.
  # --------------------------------------------------------------------------
  caveman-service:
    build:
      context: .
      dockerfile: Dockerfile.caveman
    container_name: ai-stack-caveman
    restart: unless-stopped
    networks:
      - ai-stack-net
    ports:
      - "5000:5000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      AI_STACK_OLLAMA_URL: "http://ollama:11434"
      AI_STACK_INTER_SERVICE_SECRET: "${AI_STACK_INTER_SERVICE_SECRET:-}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5000"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 3

  # --------------------------------------------------------------------------
  # AI Stack MCP — MCP server + pytest runner
  #
  # As an MCP server it's launched by Claude Code via stdio (not as a daemon).
  # In Docker we use it as a test runner / integration test environment.
  #
  # To run tests: docker compose run --rm ai-stack-mcp pytest tests/ -v
  # --------------------------------------------------------------------------
  ai-stack-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-stack-mcp
    networks:
      - ai-stack-net
    depends_on:
      ollama:
        condition: service_healthy
      caveman-service:
        condition: service_healthy
    volumes:
      - ai-stack-data:/data
      - chromadb-data:/data/chromadb
      - lancedb-data:/data/lancedb
      # Mount source for hot-reload during dev (comment out for prod)
      - ./:/app:ro
    environment:
      AI_STACK_DATA_DIR: "/data"
      AI_STACK_OLLAMA_URL: "http://ollama:11434"
      AI_STACK_OPENROUTER_API_KEY: "${AI_STACK_OPENROUTER_API_KEY:-}"
      AI_STACK_INTER_SERVICE_SECRET: "${AI_STACK_INTER_SERVICE_SECRET:-}"
      AI_STACK_SEMANTIC_CACHE_SIMILARITY_THRESHOLD: "0.85"
      PYTHONPATH: "/app"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    # Default command: run unit tests
    # Override: docker compose run --rm ai-stack-mcp python server.py
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
