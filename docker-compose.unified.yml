# Sovereign AI Platform — Unified Docker Compose
#
# Services:
#   gateway              — TypeScript Fastify Gateway (port 3000)
#   optimization-bridge  — Python HTTP Bridge for optimization (port 9100)
#   ollama               — Local LLM server (port 11434)
#   caveman-service      — Prose compression API (port 5000)
#
# Quick start:
#   docker compose -f docker-compose.unified.yml up --build -d
#
# Dev mode (gateway + bridge only):
#   docker compose -f docker-compose.unified.yml up gateway optimization-bridge
#
# Full stack with Ollama:
#   docker compose -f docker-compose.unified.yml --profile full up --build -d

version: "3.9"

networks:
  sovereign-net:
    driver: bridge

volumes:
  ollama-data:
  ai-stack-data:
  chromadb-data:
  gateway-data:

services:

  # ── Gateway (TypeScript) ──────────────────────────────────────────────────
  gateway:
    build:
      context: ./AGENT
      dockerfile: Dockerfile
    container_name: sovereign-gateway
    restart: unless-stopped
    networks:
      - sovereign-net
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      optimization-bridge:
        condition: service_healthy
    volumes:
      - gateway-data:/data
    environment:
      NODE_ENV: production
      APP_ENV: "${APP_ENV:-production}"
      SOVEREIGN_GATEWAY_PORT: "3000"
      SOVEREIGN_GATEWAY_HOST: "0.0.0.0"
      SOVEREIGN_GATEWAY_TOKEN: "${GATEWAY_AUTH_TOKEN:?Set GATEWAY_AUTH_TOKEN}"
      AI_STACK_BRIDGE_HOST: "optimization-bridge"
      AI_STACK_BRIDGE_PORT: "9100"
      AI_STACK_BRIDGE_SECRET: "${BRIDGE_SECRET:?Set BRIDGE_SECRET}"

      # Provider: Google Antigravity
      GOOGLE_OAUTH_ENABLED: "${GOOGLE_OAUTH_ENABLED:-true}"

      # Provider: Claude Code
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
      CLAUDE_AUTH_ENABLED: "${CLAUDE_AUTH_ENABLED:-true}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Optimization Bridge (Python) ──────────────────────────────────────────
  optimization-bridge:
    build:
      context: ./ai-stack-mcp
      dockerfile: Dockerfile
    container_name: sovereign-optimization
    restart: unless-stopped
    networks:
      - sovereign-net
    ports:
      - "${BRIDGE_PORT:-9100}:9100"
    volumes:
      - ai-stack-data:/data
      - chromadb-data:/data/chromadb
    environment:
      APP_ENV: "${APP_ENV:-production}"
      AI_STACK_DATA_DIR: "/data"
      AI_STACK_OLLAMA_URL: "http://ollama:11434"
      AI_STACK_OPENROUTER_API_KEY: "${AI_STACK_OPENROUTER_API_KEY:-}"
      AI_STACK_BRIDGE_SECRET: "${BRIDGE_SECRET:?Set BRIDGE_SECRET}"
      BRIDGE_CORS_ORIGIN: "${BRIDGE_CORS_ORIGIN:-https://sovereign.example.com}"
      PYTHONPATH: "/app"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    # Override default CMD to run bridge instead of MCP server
    command: ["python", "bridge.py", "--port", "9100", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9100/ready"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Ollama (Full profile only) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-ollama
    restart: unless-stopped
    profiles:
      - full
    networks:
      - sovereign-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./ai-stack-mcp/scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      OLLAMA_HOST: "0.0.0.0"
      SKIP_MODEL_PULL: "${SKIP_MODEL_PULL:-0}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── Caveman Service (Full profile only) ───────────────────────────────────
  caveman-service:
    build:
      context: ./ai-stack-mcp
      dockerfile: Dockerfile.caveman
    container_name: sovereign-caveman
    restart: unless-stopped
    profiles:
      - full
    networks:
      - sovereign-net
    ports:
      - "5000:5000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      AI_STACK_OLLAMA_URL: "http://ollama:11434"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 3
